x-v-user-name: &v-user-name ${BUILDER:-crossdev}
x-v-user-home: &v-user-home ${BUILDER_HOME:-/.crossdev}
x-v-db-name: &v-db-name dev
x-v-db-password: &v-db-password dev
x-v-root-pass: &v-root-pass dev
x-v-vscode-path: &v-vscode-path ${BUILDER_HOME:-/.crossdev}/.vscode-server
x-v-bind-ip: &v-bind-ip ${BIND_IP:-127.0.0.1}
x-v-sshd-port: &v-sshd-port ${SSH_PORT:-32222}
x-v-mysql-port: &v-mysql-port ${MYSQL_PORT:-33306}
x-v-mongodb-port: &v-mongodb-port ${MONGODB_PORT:-37017}
x-v-redis-port: &v-redis-port ${REDIS_PORT:-36379}
x-v-elasticsearch-http-port: &v-elasticsearch-http-port ${ELASTICSEARCH_HTTP_PORT:-39200}
x-v-elasticsearch-tcp-port: &v-elasticsearch-tcp-port ${ELASTICSEARCH_tcp_PORT:-39300}

x-v-args:
  &v-args
  mem_limit: "256MB"
  cpu_count: 1

services:
  crossdev:
    <<: *v-args
    container_name: "${COMPOSE_PROJECT_NAME:?err}"
    hostname: "${COMPOSE_PROJECT_NAME:?err}"
    image: ${IMAGE:-luoyuhao0x58/crossdev:latest}
    build:
      context: ./crossdev
      dockerfile: Dockerfile
      args:
        SSH_PORT: *v-sshd-port
        BUILDER: *v-user-name
        BUILDER_HOME: *v-user-home
        CONFIGS: ${CONFIGS:?err}
    environment:
      GIT_AUTHOR_NAME: "${GIT_AUTHOR_NAME:-}"
      GIT_AUTHOR_EMAIL: "${GIT_AUTHOR_EMAIL:-}"
      GIT_SIGNINGKEY: "${GIT_SIGNINGKEY:-}"
      USER_NAME: "${USER_NAME:-}"
      USER_HOME: "${USER_HOME:-}"
    ports:
      - host_ip: *v-bind-ip
        target: *v-sshd-port
        published: *v-sshd-port
    volumes:
      - type: volume
        source: data_hostkey
        target: /etc/ssh/hostkey
      - type: volume
        source: data_vscode
        target: *v-vscode-path
  mysql:
    <<: *v-args
    mem_limit: "512MB"
    container_name: "${COMPOSE_PROJECT_NAME:?err}_mysql"
    hostname: "${COMPOSE_PROJECT_NAME:?err}_mysql"
    image: mysql/mysql-server:8.0.21
    environment:
      TZ: Asia/Shanghai
      MYSQL_USER: *v-user-name
      MYSQL_PASSWORD: *v-db-password
      MYSQL_ROOT_PASSWORD: *v-db-password
      MYSQL_DATABASE: *v-db-name
    command: "--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    volumes:
      - "data_mysql:/var/lib/mysql"
    ports:
      - host_ip: *v-bind-ip
        target: 3306
        published: *v-mysql-port
  mongodb:
    <<: *v-args
    container_name: "${COMPOSE_PROJECT_NAME:?err}_mongodb"
    hostname: "${COMPOSE_PROJECT_NAME:?err}_mongodb"
    image: mongo:5.0.17
    mem_limit: "512MB"
    environment:
      MONGO_INITDB_ROOT_USERNAME: *v-user-name
      MONGO_INITDB_ROOT_PASSWORD: *v-db-password
      MONGO_INITDB_DATABASE: *v-db-name
    volumes:
      - data_mongodb:/data/db
      - data_mongodb_configdb:/data/configdb
      - ./mongo/mongo.key:/data/mongo.key
      - ./mongo/init_rs.sh:/init_rs.sh
    ports:
      - host_ip: *v-bind-ip
        target: 27017
        published: *v-mongodb-port
    command: --auth --bind_ip_all --replSet rs0 --keyFile /data/mongo.key
  redis:
    <<: *v-args
    image: redis:6.2.4
    container_name: "${COMPOSE_PROJECT_NAME:?err}_redis"
    hostname: "${COMPOSE_PROJECT_NAME:?err}_redis"
    command: [ "redis-server", "--appendonly", "yes" ]
    mem_limit: "32MB"
    volumes:
      - "data_redis:/data"
    ports:
      - host_ip: *v-bind-ip
        target: 6379
        published: *v-redis-port
  elasticsearch:
    <<: *v-args
    image: elasticsearch:8.15.0
    container_name: "${COMPOSE_PROJECT_NAME:?err}_elasticsearch"
    hostname: "${COMPOSE_PROJECT_NAME:?err}_elasticsearch"
    mem_limit: "32MB"
    ports:
      - host_ip: *v-bind-ip
        target: 9200
        published: *v-elasticsearch-http-port
      - host_ip: *v-bind-ip
        target: 9300
        published: *v-elasticsearch-tcp-port


volumes:
  data_hostkey:
  data_vscode:
  data_mysql:
  data_mongodb:
  data_mongodb_configdb:
  data_redis:
